<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Certificate</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">Certify<span>Hub</span></a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="status.html">Track</a></li>
        <li><a href="download.html" class="active">Download</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <section class="form-section">
    <div class="container">
      <h2>Download Your Certificate</h2>
      <p>Enter your Reference Number or Certificate Number to download the official certificate (only if approved).</p>
      <form id="downloadForm">
        <div class="form-group">
          <label for="certInput">Reference or Certificate Number</label>
          <input type="text" id="certInput" class="form-control" placeholder="e.g. REF-ABCD1234-56789 or CERT-XXXX-..." required />
        </div>
        <button type="submit" class="btn btn-primary">Download PDF</button>
      </form>
      <div id="progressContainer" style="display:none; margin-top:20px;">
        <div style="background:#eee; border-radius:8px; height:20px; overflow:hidden;">
          <div id="progressBar" style="width:0%; height:100%; background:#4CAF50; transition:width 0.3s;"></div>
        </div>
        <p id="progressText" style="margin-top:5px;">Generating certificate...</p>
      </div>
      <div id="result" style="margin-top:20px; display:none;"></div>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    document.getElementById('downloadForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const input = document.getElementById('certInput').value.trim();
      if (!input) return;

      const resultDiv = document.getElementById('result');
      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      resultDiv.style.display = 'none';
      progressContainer.style.display = 'block';
      progressBar.style.width = '0%';
      progressText.textContent = 'Searching for application...';

      try {
        const res = await fetch('/api/applications');
        const apps = await res.json();
        const app = apps.find(a => a.referenceNumber === input || a.certificateNumber === input);
        if (!app) {
          progressContainer.style.display = 'none';
          resultDiv.style.display = 'block';
          resultDiv.innerHTML = '<p style="color:red;">No application found with that number.</p>';
          return;
        }
        if (app.status !== 'approved') {
          progressContainer.style.display = 'none';
          resultDiv.style.display = 'block';
          resultDiv.innerHTML = '<p style="color:orange;">This application has not been approved yet. Please check status later.</p>';
          return;
        }

        progressBar.style.width = '30%';
        progressText.textContent = 'Generating certificate...';

        // Generate official certificate PDF
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape');
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();

        // Border
        doc.setDrawColor(0, 100, 200);
        doc.setLineWidth(2);
        doc.rect(10, 10, pageWidth - 20, pageHeight - 20);

        // Title
        doc.setFontSize(28);
        doc.setTextColor(0, 80, 180);
        doc.text('CERTIFICATE OF ACHIEVEMENT', pageWidth / 2, 50, { align: 'center' });

        // Recipient
        doc.setFontSize(22);
        doc.setTextColor(0, 0, 0);
        doc.text(`This is to certify that`, pageWidth / 2, 80, { align: 'center' });
        doc.setFontSize(32);
        doc.setTextColor(0, 100, 0);
        doc.text(app.fullName || 'N/A', pageWidth / 2, 115, { align: 'center' });

        // Type
        doc.setFontSize(18);
        doc.setTextColor(0, 0, 0);
        const typeNames = { academic: 'Academic Excellence', professional: 'Professional Achievement', community: 'Community Service', training: 'Training Program' };
        const typeLabel = typeNames[app.type] || app.type || 'Certificate';
        doc.text(`has successfully completed the ${typeLabel} program.`, pageWidth / 2, 145, { align: 'center' });

        // Certificate number and date
        doc.setFontSize(14);
        doc.text(`Certificate Number: ${app.certificateNumber || 'N/A'}`, pageWidth / 2, 180, { align: 'center' });
        doc.text(`Date: ${app.submissionDate || new Date().toISOString().split('T')[0]}`, pageWidth / 2, 195, { align: 'center' });

        // Footer
        doc.setFontSize(12);
        doc.setTextColor(100);
        doc.text('Issued by CertifyHub', pageWidth / 2, 220, { align: 'center' });

        progressBar.style.width = '70%';
        progressText.textContent = 'Finalizing PDF...';

        // Download
        const pdfBlob = doc.output('blob');
        const url = URL.createObjectURL(pdfBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `certificate-${app.certificateNumber || 'download'}.pdf`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        progressBar.style.width = '100%';
        progressText.textContent = 'Download complete!';
        setTimeout(() => {
          progressContainer.style.display = 'none';
        }, 2000);

      } catch (err) {
        console.error(err);
        progressContainer.style.display = 'none';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<p style="color:red;">Error retrieving data. Please try again.</p>';
      }
    });
  </script>
</body>
</html>
