<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Certificate</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">CertifyHub</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="status.html">Track</a></li>
        <li><a href="download.html">Download</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <section class="form-section">
    <div class="container">
      <h2>Apply for Certificate</h2>
      <p id="certTypeDisplay" style="font-weight:500; color:#475569;"></p>
      <form id="applyForm">
        <div id="dynamicFields"></div>
        <button type="submit" class="btn btn-primary">Submit Application</button>
      </form>
      <div id="progressContainer" style="display:none; margin-top:20px;">
        <div style="background:#e2e8f0; border-radius:8px; height:20px; overflow:hidden;">
          <div id="progressBar" style="width:0%; height:100%; background:#0f172a; transition:width 0.3s;"></div>
        </div>
        <p id="progressText" style="margin-top:5px; color:#475569;">Generating PDF...</p>
      </div>
      <!-- Error display area -->
      <div id="errorMessage" style="display:none; margin-top:20px; padding:1rem; background:#fee2e2; border:1px solid #ef4444; border-radius:8px; color:#991b1b;"></div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2026 CertifyHub. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    // ============================================================
    // DYNAMIC FORM – 10 fields per certificate type
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const type = params.get('type') || 'academic';
      const fieldsContainer = document.getElementById('dynamicFields');
      const typeDisplay = document.getElementById('certTypeDisplay');

      const typeNames = {
        academic: 'Academic Excellence',
        professional: 'Professional Achievement',
        community: 'Community Service',
        training: 'Training Program'
      };
      typeDisplay.textContent = `Certificate Type: ${typeNames[type] || type}`;

      // ---------- Extended field sets ----------
      const fieldSets = {
        academic: [
          { name: 'fullName', label: 'Full Name', required: true, type: 'text', placeholder: 'e.g. John Doe' },
          { name: 'email', label: 'Email Address', required: true, type: 'email', placeholder: 'john@example.com' },
          { name: 'phone', label: 'Phone Number', required: true, type: 'tel', placeholder: '+1 234 567 890' },
          { name: 'dob', label: 'Date of Birth', required: true, type: 'date' },
          { name: 'institution', label: 'Institution / University', required: true, type: 'text', placeholder: 'Harvard University' },
          { name: 'gpa', label: 'GPA (out of 4.0)', required: false, type: 'text', placeholder: '3.8' },
          { name: 'major', label: 'Major / Field of Study', required: true, type: 'text', placeholder: 'Computer Science' },
          { name: 'graduationYear', label: 'Year of Graduation', required: true, type: 'number', placeholder: '2025' },
          { name: 'address', label: 'Mailing Address', required: true, type: 'text', placeholder: '123 Main St, City, Country' },
          { name: 'additional', label: 'Additional Notes (optional)', required: false, type: 'text', placeholder: 'Any other info' }
        ],
        professional: [
          { name: 'fullName', label: 'Full Name', required: true, type: 'text', placeholder: 'e.g. Jane Smith' },
          { name: 'email', label: 'Email Address', required: true, type: 'email', placeholder: 'jane@company.com' },
          { name: 'phone', label: 'Phone Number', required: true, type: 'tel', placeholder: '+1 987 654 321' },
          { name: 'dob', label: 'Date of Birth', required: true, type: 'date' },
          { name: 'company', label: 'Company / Organization', required: true, type: 'text', placeholder: 'Google Inc.' },
          { name: 'position', label: 'Job Title / Position', required: true, type: 'text', placeholder: 'Senior Developer' },
          { name: 'yearsOfExperience', label: 'Years of Experience', required: true, type: 'number', placeholder: '5' },
          { name: 'industry', label: 'Industry / Sector', required: true, type: 'text', placeholder: 'Technology' },
          { name: 'achievements', label: 'Key Achievements (brief)', required: true, type: 'text', placeholder: 'Led team to deliver X project' },
          { name: 'address', label: 'Work Address', required: true, type: 'text', placeholder: '1600 Amphitheatre Pkwy, CA' }
        ],
        community: [
          { name: 'fullName', label: 'Full Name', required: true, type: 'text', placeholder: 'e.g. Maria Garcia' },
          { name: 'email', label: 'Email Address', required: true, type: 'email', placeholder: 'maria@community.org' },
          { name: 'phone', label: 'Phone Number', required: true, type: 'tel', placeholder: '+1 555 123 456' },
          { name: 'dob', label: 'Date of Birth', required: true, type: 'date' },
          { name: 'organization', label: 'Organization / NGO', required: true, type: 'text', placeholder: 'Red Cross' },
          { name: 'role', label: 'Your Role / Title', required: true, type: 'text', placeholder: 'Volunteer Coordinator' },
          { name: 'hours', label: 'Total Volunteer Hours', required: true, type: 'number', placeholder: '200' },
          { name: 'project', label: 'Project / Initiative Name', required: true, type: 'text', placeholder: 'Clean Water Drive' },
          { name: 'impact', label: 'Impact / Results (brief)', required: true, type: 'text', placeholder: 'Provided clean water to 500 families' },
          { name: 'address', label: 'Your Address', required: true, type: 'text', placeholder: '456 Oak St, City' }
        ],
        training: [
          { name: 'fullName', label: 'Full Name', required: true, type: 'text', placeholder: 'e.g. David Lee' },
          { name: 'email', label: 'Email Address', required: true, type: 'email', placeholder: 'david@training.com' },
          { name: 'phone', label: 'Phone Number', required: true, type: 'tel', placeholder: '+1 321 654 987' },
          { name: 'dob', label: 'Date of Birth', required: true, type: 'date' },
          { name: 'program', label: 'Training Program Name', required: true, type: 'text', placeholder: 'Advanced Data Science' },
          { name: 'provider', label: 'Training Provider / Institute', required: true, type: 'text', placeholder: 'Coursera' },
          { name: 'startDate', label: 'Start Date', required: true, type: 'date' },
          { name: 'completionDate', label: 'Completion Date', required: true, type: 'date' },
          { name: 'duration', label: 'Duration (weeks)', required: true, type: 'number', placeholder: '12' },
          { name: 'certification', label: 'Certification Earned (if any)', required: false, type: 'text', placeholder: 'Python for Data Science' }
        ]
      };

      const fields = fieldSets[type] || fieldSets.academic;

      // Build form
      fields.forEach(f => {
        const div = document.createElement('div');
        div.className = 'form-group';
        const label = document.createElement('label');
        label.setAttribute('for', f.name);
        label.textContent = f.label + (f.required ? ' *' : '');
        const input = document.createElement('input');
        input.type = f.type;
        input.id = f.name;
        input.name = f.name;
        if (f.required) input.required = true;
        if (f.placeholder) input.placeholder = f.placeholder;
        input.className = 'form-control';
        div.appendChild(label);
        div.appendChild(input);
        fieldsContainer.appendChild(div);
      });

      // Reference number generator (fallback if script.js not loaded)
      function generateRef() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let ref = 'REF-';
        for (let i = 0; i < 8; i++) ref += chars.charAt(Math.floor(Math.random() * chars.length));
        ref += '-';
        for (let i = 0; i < 5; i++) ref += chars.charAt(Math.floor(Math.random() * chars.length));
        return ref;
      }

      // Submit handler with detailed error handling
      document.getElementById('applyForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Clear previous error
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.style.display = 'none';
        errorDiv.textContent = '';

        // Validate required fields
        const inputs = this.querySelectorAll('input[required]');
        let valid = true;
        inputs.forEach(inp => {
          if (!inp.value.trim()) { 
            valid = false; 
            inp.style.borderColor = '#ef4444';
          } else {
            inp.style.borderColor = '';
          }
        });
        const emailInput = document.getElementById('email');
        if (emailInput && emailInput.value) {
          const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailPattern.test(emailInput.value)) { 
            valid = false; 
            emailInput.style.borderColor = '#ef4444';
            alert('Please enter a valid email address.');
          }
        }
        if (!valid) {
          alert('Please fill in all required fields.');
          return;
        }

        // Gather data
        const data = { type };
        fields.forEach(f => {
          const el = document.getElementById(f.name);
          if (el) data[f.name] = el.value.trim();
        });
        // Ensure reference number is present
        const ref = generateRef();
        data.referenceNumber = ref;
        data.status = 'pending';
        data.submissionDate = new Date().toISOString().split('T')[0];
        data.certificateNumber = '';

        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        progressText.textContent = 'Saving application...';

        try {
          const response = await fetch('/api/applications', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          // Check if response is ok
          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `Server error (${response.status})`);
          }

          const saved = await response.json();

          progressBar.style.width = '50%';
          progressText.textContent = 'Generating receipt PDF...';

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          doc.setFontSize(16);
          doc.text('Certificate Application Receipt', 20, 30);
          doc.setFontSize(12);
          doc.text(`Reference Number: ${saved.referenceNumber}`, 20, 50);
          doc.text(`Applicant: ${saved.fullName || 'N/A'}`, 20, 60);
          doc.text(`Certificate Type: ${typeNames[type] || type}`, 20, 70);
          doc.text(`Submission Date: ${saved.submissionDate}`, 20, 80);
          doc.text('Status: Pending', 20, 90);
          doc.text('Thank you for your application. You will be notified once reviewed.', 20, 110);

          progressBar.style.width = '80%';
          progressText.textContent = 'Downloading receipt...';

          const pdfBlob = doc.output('blob');
          const url = URL.createObjectURL(pdfBlob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `receipt-${saved.referenceNumber}.pdf`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);

          progressBar.style.width = '100%';
          progressText.textContent = 'Done! Receipt downloaded.';
          setTimeout(() => { 
            progressContainer.style.display = 'none'; 
            this.reset();
          }, 2000);

        } catch (err) {
          console.error('Submission error:', err);
          // Show error to user
          errorDiv.textContent = 'Error: ' + (err.message || 'Unknown error. Please try again.');
          errorDiv.style.display = 'block';
          progressContainer.style.display = 'none';
        }
      });
    });
  </script>
</body>
</html>
