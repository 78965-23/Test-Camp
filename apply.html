<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Certificate</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- Navigation (same) -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">CertifyHub</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="status.html">Track</a></li>
        <li><a href="download.html">Download</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <section class="form-section">
    <div class="container">
      <h2>Apply for Certificate</h2>
      <p id="certTypeDisplay" style="font-weight:500; color:#475569;"></p>

      <!-- Progress Indicator -->
      <div style="display:flex; gap:12px; margin-bottom:30px; justify-content:center;">
        <span id="stepIndicator1" class="step-badge active-step">1. Personal</span>
        <span id="stepIndicator2" class="step-badge">2. Additional</span>
        <span id="stepIndicator3" class="step-badge">3. Review</span>
      </div>

      <form id="applyForm" novalidate>
        <!-- Step 1 -->
        <div id="step1" class="form-step">
          <h3 style="margin-bottom:20px;">Personal &amp; Address Details</h3>
          <div id="step1Fields"></div>
          <button type="button" class="btn btn-primary next-step">Next →</button>
        </div>

        <!-- Step 2 -->
        <div id="step2" class="form-step" style="display:none;">
          <h3 style="margin-bottom:20px;">Additional Important Details</h3>
          <div id="step2Fields"></div>
          <div style="display:flex; gap:12px; justify-content:space-between;">
            <button type="button" class="btn btn-secondary prev-step">← Back</button>
            <button type="button" class="btn btn-primary next-step">Next →</button>
          </div>
        </div>

        <!-- Step 3 -->
        <div id="step3" class="form-step" style="display:none;">
          <h3 style="margin-bottom:20px;">Review Your Application</h3>
          <div id="reviewContainer" style="background:#f8fafc; padding:1.5rem; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:20px; max-height:400px; overflow-y:auto;"></div>
          <div style="display:flex; gap:12px; justify-content:space-between;">
            <button type="button" class="btn btn-secondary prev-step">← Back</button>
            <button type="submit" class="btn btn-success" id="submitBtn">Submit Application</button>
          </div>
        </div>

        <!-- Spinner -->
        <div id="progressContainer" style="display:none; margin-top:20px;">
          <div style="display:flex; align-items:center; gap:16px; justify-content:center;">
            <div class="spinner"></div>
            <p id="progressText" style="color:#475569; font-weight:500;">Submitting your application...</p>
          </div>
          <div style="background:#e2e8f0; border-radius:8px; height:6px; margin-top:12px; overflow:hidden;">
            <div id="progressBar" style="width:0%; height:100%; background:#0f172a; transition:width 0.5s;"></div>
          </div>
        </div>

        <div id="successMessage" style="display:none; margin-top:20px; padding:1rem; background:#dcfce7; border:1px solid #22c55e; border-radius:8px; color:#166534;"></div>
        <div id="errorMessage" style="display:none; margin-top:20px; padding:1rem; background:#fee2e2; border:1px solid #ef4444; border-radius:8px; color:#991b1b;"></div>
      </form>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2026 CertifyHub. All rights reserved.</p>
    </div>
  </footer>

  <style>
    .step-badge { padding: 6px 18px; border-radius: 30px; font-size: 0.9rem; font-weight: 600; background: #e2e8f0; color: #64748b; }
    .active-step { background: #0f172a; color: #fff; }
    .form-step { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { width: 30px; height: 30px; border: 4px solid #e2e8f0; border-top-color: #0f172a; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-success:hover { background: #16a34a; }
  </style>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const type = params.get('type') || 'academic';
      const typeDisplay = document.getElementById('certTypeDisplay');

      const typeNames = {
        academic: 'Academic Excellence',
        professional: 'Professional Achievement',
        community: 'Community Service',
        training: 'Training Program',
        billionaire: 'Billionaire Cert',
        millionaire: 'Millionaire Cert',
        trillionaire: 'Trillionaire Cert',
        mathexpert: 'Math Expert Cert',
        coaching: 'Coaching Registration'
      };
      typeDisplay.textContent = `Certificate Type: ${typeNames[type] || type}`;

      // Base fields (step 1)
      const baseFields = [
        { name: 'fullName', label: 'Full Name', required: true, type: 'text', placeholder: 'e.g. John Doe', step: 1 },
        { name: 'email', label: 'Email Address', required: true, type: 'email', placeholder: 'john@example.com', step: 1 },
        { name: 'phone', label: 'Phone Number', required: true, type: 'tel', placeholder: '+1 234 567 890', step: 1 },
        { name: 'dob', label: 'Date of Birth', required: true, type: 'date', step: 1 },
        { name: 'gender', label: 'Gender', required: true, type: 'select', options: ['Male', 'Female', 'Other'], step: 1 },
        { name: 'nationality', label: 'Nationality', required: true, type: 'text', placeholder: 'e.g. American', step: 1 },
        { name: 'residentialAddress', label: 'Residential Address', required: true, type: 'text', placeholder: '123 Main St, City', step: 1 },
        { name: 'permanentAddress', label: 'Permanent Address', required: false, type: 'text', placeholder: 'Same as residential or enter', step: 1 },
        { name: 'otherAddress', label: 'Other Address (optional)', required: false, type: 'text', placeholder: 'Any other address', step: 1 },
        { name: 'city', label: 'City', required: true, type: 'text', placeholder: 'New York', step: 1 },
        { name: 'state', label: 'State / Province', required: true, type: 'text', placeholder: 'NY', step: 1 },
        { name: 'postalCode', label: 'Postal / Zip Code', required: true, type: 'text', placeholder: '10001', step: 1 },
        // Step 2 (additional)
        { name: 'emergencyName', label: 'Emergency Contact Name', required: true, type: 'text', placeholder: 'e.g. Jane Doe', step: 2 },
        { name: 'emergencyPhone', label: 'Emergency Contact Phone', required: true, type: 'tel', placeholder: '+1 987 654 321', step: 2 },
        { name: 'emergencyRelation', label: 'Relationship', required: true, type: 'text', placeholder: 'Spouse', step: 2 },
        { name: 'medicalConditions', label: 'Medical Conditions (if any)', required: false, type: 'text', placeholder: 'None', step: 2 },
        { name: 'specialRequests', label: 'Special Requests / Accommodations', required: false, type: 'text', placeholder: 'Wheelchair access', step: 2 },
        { name: 'previousCertificate', label: 'Previous Certificate (if any)', required: false, type: 'text', placeholder: 'e.g. Certificate of Completion 2020', step: 2 },
        { name: 'additionalDocs', label: 'Additional Documents (brief description)', required: false, type: 'text', placeholder: 'Transcript, ID copy', step: 2 }
      ];

      // Type-specific fields (some types have extra fields, others none)
      const typeSpecific = {
        academic: [
          { name: 'institution', label: 'Institution / University', required: true, type: 'text', placeholder: 'Harvard University', step: 2 },
          { name: 'gpa', label: 'GPA (out of 4.0)', required: false, type: 'text', placeholder: '3.8', step: 2 },
          { name: 'major', label: 'Major / Field of Study', required: true, type: 'text', placeholder: 'Computer Science', step: 2 },
          { name: 'graduationYear', label: 'Year of Graduation', required: true, type: 'number', placeholder: '2025', step: 2 },
          { name: 'additional', label: 'Additional Notes (optional)', required: false, type: 'text', placeholder: 'Any other info', step: 2 }
        ],
        professional: [
          { name: 'company', label: 'Company / Organization', required: true, type: 'text', placeholder: 'Google Inc.', step: 2 },
          { name: 'position', label: 'Job Title / Position', required: true, type: 'text', placeholder: 'Senior Developer', step: 2 },
          { name: 'yearsOfExperience', label: 'Years of Experience', required: true, type: 'number', placeholder: '5', step: 2 },
          { name: 'industry', label: 'Industry / Sector', required: true, type: 'text', placeholder: 'Technology', step: 2 },
          { name: 'achievements', label: 'Key Achievements (brief)', required: true, type: 'text', placeholder: 'Led team to deliver X project', step: 2 }
        ],
        community: [
          { name: 'organization', label: 'Organization / NGO', required: true, type: 'text', placeholder: 'Red Cross', step: 2 },
          { name: 'role', label: 'Your Role / Title', required: true, type: 'text', placeholder: 'Volunteer Coordinator', step: 2 },
          { name: 'hours', label: 'Total Volunteer Hours', required: true, type: 'number', placeholder: '200', step: 2 },
          { name: 'project', label: 'Project / Initiative Name', required: true, type: 'text', placeholder: 'Clean Water Drive', step: 2 },
          { name: 'impact', label: 'Impact / Results (brief)', required: true, type: 'text', placeholder: 'Provided clean water to 500 families', step: 2 }
        ],
        training: [
          { name: 'program', label: 'Training Program Name', required: true, type: 'text', placeholder: 'Advanced Data Science', step: 2 },
          { name: 'provider', label: 'Training Provider / Institute', required: true, type: 'text', placeholder: 'Coursera', step: 2 },
          { name: 'startDate', label: 'Start Date', required: true, type: 'date', step: 2 },
          { name: 'completionDate', label: 'Completion Date', required: true, type: 'date', step: 2 },
          { name: 'duration', label: 'Duration (weeks)', required: true, type: 'number', placeholder: '12', step: 2 },
          { name: 'certification', label: 'Certification Earned (if any)', required: false, type: 'text', placeholder: 'Python for Data Science', step: 2 }
        ],
        // New types have no extra fields
        billionaire: [],
        millionaire: [],
        trillionaire: [],
        mathexpert: [],
        coaching: []
      };

      const allFields = [...baseFields, ...(typeSpecific[type] || [])];
      const step1Fields = allFields.filter(f => f.step === 1);
      const step2Fields = allFields.filter(f => f.step === 2);

      function renderFields(containerId, fields) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        fields.forEach(f => {
          const div = document.createElement('div');
          div.className = 'form-group';
          const label = document.createElement('label');
          label.setAttribute('for', f.name);
          label.textContent = f.label + (f.required ? ' *' : '');
          let input;
          if (f.type === 'select') {
            input = document.createElement('select');
            input.id = f.name;
            input.name = f.name;
            if (f.required) input.required = true;
            input.className = 'form-control';
            f.options.forEach(opt => {
              const option = document.createElement('option');
              option.value = opt;
              option.textContent = opt;
              input.appendChild(option);
            });
          } else {
            input = document.createElement('input');
            input.type = f.type;
            input.id = f.name;
            input.name = f.name;
            if (f.required) input.required = true;
            if (f.placeholder) input.placeholder = f.placeholder;
            input.className = 'form-control';
          }
          div.appendChild(label);
          div.appendChild(input);
          container.appendChild(div);
        });
      }

      renderFields('step1Fields', step1Fields);
      renderFields('step2Fields', step2Fields);

      // ---- Step navigation (same as before) ----
      let currentStep = 1;
      const totalSteps = 3;
      const step1Div = document.getElementById('step1');
      const step2Div = document.getElementById('step2');
      const step3Div = document.getElementById('step3');
      const indicators = {
        1: document.getElementById('stepIndicator1'),
        2: document.getElementById('stepIndicator2'),
        3: document.getElementById('stepIndicator3')
      };

      function showStep(step) {
        step1Div.style.display = step === 1 ? 'block' : 'none';
        step2Div.style.display = step === 2 ? 'block' : 'none';
        step3Div.style.display = step === 3 ? 'block' : 'none';
        for (let i = 1; i <= 3; i++) {
          indicators[i].classList.toggle('active-step', i === step);
        }
        currentStep = step;
        document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      document.querySelectorAll('.next-step').forEach(btn => {
        btn.addEventListener('click', function() {
          const currentDiv = currentStep === 1 ? step1Div : step2Div;
          const inputs = currentDiv.querySelectorAll('input[required], select[required]');
          let valid = true;
          inputs.forEach(inp => {
            if (!inp.value.trim()) { valid = false; inp.style.borderColor = '#ef4444'; }
            else inp.style.borderColor = '';
          });
          if (!valid) { alert('Please fill in all required fields in this section.'); return; }
          const emailInput = document.getElementById('email');
          if (emailInput && emailInput.value) {
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(emailInput.value)) {
              emailInput.style.borderColor = '#ef4444';
              alert('Please enter a valid email address.');
              return;
            }
          }
          if (currentStep < totalSteps) {
            if (currentStep === 2) {
              showStep(3);
              generateReview();
            } else {
              showStep(currentStep + 1);
            }
          }
        });
      });

      document.querySelectorAll('.prev-step').forEach(btn => {
        btn.addEventListener('click', function() {
          if (currentStep > 1) showStep(currentStep - 1);
        });
      });

      function generateReview() {
        const container = document.getElementById('reviewContainer');
        let html = '<dl style="display:grid; grid-template-columns:1fr 2fr; gap:8px;">';
        allFields.forEach(f => {
          const el = document.getElementById(f.name);
          if (el) {
            const val = el.value ? el.value.trim() : 'Not provided';
            html += `<dt><strong>${f.label}</strong></dt><dd>${val}</dd>`;
          }
        });
        html += '</dl>';
        container.innerHTML = html;
      }

      // ---- Submit ----
      const certPhrases = {
        academic: 'has successfully completed the Academic Excellence program.',
        professional: 'has successfully completed the Professional Achievement program.',
        community: 'has successfully completed the Community Service program.',
        training: 'has successfully completed the Training Program.',
        billionaire: 'is recognized as a Billionaire.',
        millionaire: 'is recognized as a Millionaire.',
        trillionaire: 'is recognized as a Trillionaire.',
        mathexpert: 'is a certified Math Expert.',
        coaching: 'has successfully registered for the Coaching Program.'
      };

      document.getElementById('applyForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        progressText.textContent = 'Processing your application...';

        const data = { type };
        allFields.forEach(f => {
          const el = document.getElementById(f.name);
          if (el) data[f.name] = el.value.trim();
        });
        const ref = generateRef();
        data.referenceNumber = ref;
        data.status = 'pending';
        data.submissionDate = new Date().toISOString().split('T')[0];
        data.certificateNumber = '';

        try {
          progressBar.style.width = '30%';
          progressText.textContent = 'Saving application...';
          let apps = JSON.parse(localStorage.getItem('applications') || '[]');
          apps.push(data);
          localStorage.setItem('applications', JSON.stringify(apps));

          progressBar.style.width = '60%';
          progressText.textContent = 'Generating receipt PDF...';

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          const margin = 20;
          const pageWidth = doc.internal.pageSize.getWidth();
          const pageHeight = doc.internal.pageSize.getHeight();

          doc.setFontSize(18);
          doc.setTextColor(0);
          doc.text('ACKNOWLEDGEMENT RECEIPT', pageWidth/2, margin+10, { align: 'center' });
          doc.setLineWidth(0.5);
          doc.line(margin, margin+15, pageWidth-margin, margin+15);

          let y = margin + 25;
          doc.setFontSize(12);
          doc.text(`Reference Number: ${data.referenceNumber}`, margin, y);
          y += 8;
          doc.text(`Date: ${data.submissionDate}`, margin, y);
          y += 12;
          doc.text(`To,`, margin, y);
          y += 8;
          doc.text(`${data.fullName || 'N/A'}`, margin, y);
          y += 6;
          doc.text(`Certificate Type: ${typeNames[type] || type}`, margin, y);
          y += 10;
          const phrase = certPhrases[type] || 'has successfully completed the certificate program.';
          doc.text(`This is to acknowledge that your application for the ${typeNames[type] || type} certificate`, margin, y);
          y += 7;
          doc.text(`has been successfully submitted and is currently under review.`, margin, y);
          y += 12;
          doc.text(`We will notify you once the review is complete.`, margin, y);
          y += 8;
          doc.text(`Thank you for using CertifyHub.`, margin, y);

          const footerY = pageHeight - margin - 10;
          doc.setFontSize(10);
          doc.text('This is a system-generated receipt. No signature required.', pageWidth/2, footerY, { align: 'center' });

          progressBar.style.width = '80%';
          progressText.textContent = 'Downloading receipt...';

          const pdfBlob = doc.output('blob');
          const url = URL.createObjectURL(pdfBlob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `acknowledgement-${data.referenceNumber}.pdf`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);

          progressBar.style.width = '100%';
          progressText.textContent = 'Done!';
          const successDiv = document.getElementById('successMessage');
          successDiv.textContent = `✅ Application submitted successfully! Reference: ${data.referenceNumber}. Receipt downloaded.`;
          successDiv.style.display = 'block';

          setTimeout(() => {
            progressContainer.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Application';
            this.reset();
            showStep(1);
          }, 2000);

        } catch (err) {
          console.error(err);
          const errorDiv = document.getElementById('errorMessage');
          errorDiv.textContent = 'Error: ' + (err.message || 'Unknown error. Please try again.');
          errorDiv.style.display = 'block';
          progressContainer.style.display = 'none';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Application';
        }
      });

      function generateRef() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let ref = 'REF-';
        for (let i = 0; i < 8; i++) ref += chars.charAt(Math.floor(Math.random() * chars.length));
        ref += '-';
        for (let i = 0; i < 5; i++) ref += chars.charAt(Math.floor(Math.random() * chars.length));
        return ref;
      }

      showStep(1);
    });
  </script>
</body>
</html>
