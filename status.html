<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Status</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">CertifyHub</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="status.html" class="active">Track</a></li>
        <li><a href="download.html">Download</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <section class="form-section">
    <div class="container">
      <h2>Track Your Application</h2>
      <p>Enter your Reference Number to check the status.</p>
      <form id="trackForm">
        <div class="form-group">
          <label for="refInput">Reference Number</label>
          <input type="text" id="refInput" class="form-control" placeholder="e.g. REF-ABCD1234-56789" required />
        </div>
        <button type="submit" class="btn btn-primary">Track</button>
      </form>
      <div id="result" style="margin-top:20px; display:none;"></div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2026 CertifyHub. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    document.getElementById('trackForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const ref = document.getElementById('refInput').value.trim();
      if (!ref) return;
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      
      // Get applications from localStorage
      const apps = JSON.parse(localStorage.getItem('applications') || '[]');
      const app = apps.find(a => a.referenceNumber === ref);
      
      if (!app) {
        resultDiv.innerHTML = '<p style="color:#ef4444;">❌ Application not found. Please check the reference number.</p>';
        return;
      }
      
      const statusColor = app.status === 'approved' ? '#22c55e' : app.status === 'rejected' ? '#ef4444' : '#f59e0b';
      resultDiv.innerHTML = `
        <div style="background:#ffffff; border-radius:12px; padding:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,0.06); border:1px solid #e2e8f0;">
          <h3 style="margin-bottom:0.75rem;">✅ Application Details</h3>
          <p><strong>Reference:</strong> ${app.referenceNumber}</p>
          <p><strong>Applicant:</strong> ${app.fullName || 'N/A'}</p>
          <p><strong>Type:</strong> ${app.type || 'N/A'}</p>
          <p><strong>Date:</strong> ${app.submissionDate || 'N/A'}</p>
          <p><strong>Status:</strong> <span style="color:${statusColor}; font-weight:600; text-transform:capitalize;">${app.status}</span></p>
          ${app.certificateNumber ? `<p><strong>Certificate No:</strong> ${app.certificateNumber}</p>` : ''}
        </div>
      `;
    });
  </script>
</body>
</html>
