<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Certificate</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="certificateGenerator.js"></script>
</head>
<body>
  <!-- Navigation (same as before) -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">CertifyHub</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="status.html">Track</a></li>
        <li><a href="download.html" class="active">Download</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <section class="form-section">
    <div class="container">
      <h2>Download Your Certificate</h2>
      <p>Enter Reference or Certificate Number (only approved applications).</p>
      <form id="downloadForm">
        <div class="form-group">
          <label for="certInput">Reference or Certificate Number</label>
          <input type="text" id="certInput" class="form-control" placeholder="REF-... or CERT-..." required />
        </div>
        <button type="submit" class="btn btn-primary">Download PDF</button>
      </form>
      <div id="progressContainer" style="display:none; margin-top:20px;">
        <div style="background:#e2e8f0; border-radius:8px; height:20px; overflow:hidden;">
          <div id="progressBar" style="width:0%; height:100%; background:#0f172a;"></div>
        </div>
        <p id="progressText" style="margin-top:5px; color:#475569;">Generating...</p>
      </div>
      <div id="result" style="margin-top:20px; display:none;"></div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2026 CertifyHub. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    document.getElementById('downloadForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = document.getElementById('certInput').value.trim();
      if (!input) return;

      const resultDiv = document.getElementById('result');
      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      resultDiv.style.display = 'none';
      progressContainer.style.display = 'block';
      progressBar.style.width = '0%';
      progressText.textContent = 'Searching...';

      const apps = JSON.parse(localStorage.getItem('applications') || '[]');
      const app = apps.find(a => a.referenceNumber === input || a.certificateNumber === input);

      if (!app) {
        progressContainer.style.display = 'none';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<p style="color:#ef4444;">❌ No application found.</p>';
        return;
      }

      if (app.status !== 'approved') {
        progressContainer.style.display = 'none';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<p style="color:#f59e0b;">⏳ Application not approved yet. Status: ' + app.status + '</p>';
        return;
      }

      progressBar.style.width = '30%';
      progressText.textContent = 'Generating certificate...';

      try {
        // Use the shared generator
        generateCertificatePDF(app, 'certificate');
        progressBar.style.width = '100%';
        progressText.textContent = '✅ Download complete!';
        setTimeout(() => { progressContainer.style.display = 'none'; }, 2000);
      } catch (err) {
        console.error(err);
        progressContainer.style.display = 'none';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<p style="color:#ef4444;">❌ Error generating certificate. Try again.</p>';
      }
    });
  </script>
</body>
</html>
