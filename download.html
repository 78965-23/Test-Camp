<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Certificate</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">CertifyHub</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="status.html">Track</a></li>
        <li><a href="download.html" class="active">Download</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <section class="form-section">
    <div class="container">
      <h2>Download Your Certificate</h2>
      <p>Enter Reference or Certificate Number (only approved applications).</p>
      <form id="downloadForm">
        <div class="form-group">
          <label for="certInput">Reference or Certificate Number</label>
          <input type="text" id="certInput" class="form-control" placeholder="REF-... or CERT-..." required />
        </div>
        <button type="submit" class="btn btn-primary">Download PDF</button>
      </form>
      <div id="progressContainer" style="display:none; margin-top:20px;">
        <div style="background:#e2e8f0; border-radius:8px; height:20px; overflow:hidden;">
          <div id="progressBar" style="width:0%; height:100%; background:#0f172a;"></div>
        </div>
        <p id="progressText" style="margin-top:5px; color:#475569;">Generating...</p>
      </div>
      <div id="result" style="margin-top:20px; display:none;"></div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2026 CertifyHub. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    document.getElementById('downloadForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = document.getElementById('certInput').value.trim();
      if (!input) return;

      const resultDiv = document.getElementById('result');
      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      resultDiv.style.display = 'none';
      progressContainer.style.display = 'block';
      progressBar.style.width = '0%';
      progressText.textContent = 'Searching...';

      // Get from localStorage
      const apps = JSON.parse(localStorage.getItem('applications') || '[]');
      const app = apps.find(a => a.referenceNumber === input || a.certificateNumber === input);

      if (!app) {
        progressContainer.style.display = 'none';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<p style="color:#ef4444;">❌ No application found.</p>';
        return;
      }

      if (app.status !== 'approved') {
        progressContainer.style.display = 'none';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<p style="color:#f59e0b;">⏳ Application not approved yet. Status: ' + app.status + '</p>';
        return;
      }

      progressBar.style.width = '30%';
      progressText.textContent = 'Generating certificate...';

      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('portrait', 'mm', 'a4');
        const margin = 20;
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();

        // Border
        doc.setDrawColor(0);
        doc.setLineWidth(1);
        doc.rect(margin, margin, pageWidth - 2*margin, pageHeight - 2*margin);

        let y = margin + 20;
        const center = pageWidth / 2;

        // Title
        doc.setFontSize(18);
        doc.setFont('times', 'bold');
        doc.text('CERTIFICATE OF ACHIEVEMENT', center, y, { align: 'center' });
        y += 12;

        doc.setFontSize(12);
        doc.setFont('times', 'normal');
        doc.text('This is to certify that', center, y, { align: 'center' });
        y += 10;

        // Name (underlined)
        doc.setFontSize(16);
        doc.setFont('times', 'bold');
        const name = app.fullName || 'N/A';
        doc.text(name, center, y, { align: 'center' });
        // Underline
        const nameWidth = doc.getStringUnitWidth(name) * 16 / doc.internal.scaleFactor;
        doc.line(center - nameWidth/2, y+1, center + nameWidth/2, y+1);
        y += 12;

        doc.setFontSize(12);
        doc.setFont('times', 'normal');
        doc.text('has successfully completed the', center, y, { align: 'center' });
        y += 10;

        doc.setFontSize(14);
        doc.setFont('times', 'bold');
        const title = app.type || 'Certificate';
        doc.text(title, center, y, { align: 'center' });
        // Underline
        const titleWidth = doc.getStringUnitWidth(title) * 14 / doc.internal.scaleFactor;
        doc.line(center - titleWidth/2, y+1, center + titleWidth/2, y+1);
        y += 14;

        // Details section
        doc.setFontSize(10);
        doc.setFont('times', 'normal');
        const details = [
          `Reference No: ${app.referenceNumber}`,
          `Certificate No: ${app.certificateNumber || 'N/A'}`,
          `Date: ${app.submissionDate || new Date().toISOString().split('T')[0]}`,
          `Email: ${app.email || 'N/A'}`,
          `Phone: ${app.phone || 'N/A'}`,
          `Address: ${app.address || app.residentialAddress || 'N/A'}`
        ];
        // Add more fields if present
        const extraFields = ['institution', 'company', 'organization', 'program', 'major', 'position', 'project'];
        extraFields.forEach(f => {
          if (app[f]) details.push(`${f.charAt(0).toUpperCase()+f.slice(1)}: ${app[f]}`);
        });

        let detailY = y;
        doc.setFontSize(10);
        details.forEach(line => {
          doc.text(line, margin + 10, detailY);
          detailY += 7;
        });

        // Footer
        const footerY = pageHeight - margin - 15;
        doc.setFontSize(9);
        doc.setFont('times', 'italic');
        doc.text('This certificate is issued by CertifyHub and is digitally verifiable.', center, footerY, { align: 'center' });

        progressBar.style.width = '70%';
        progressText.textContent = 'Finalizing...';

        const pdfBlob = doc.output('blob');
        const url = URL.createObjectURL(pdfBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `certificate-${app.certificateNumber || 'download'}.pdf`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        progressBar.style.width = '100%';
        progressText.textContent = '✅ Download complete!';
        setTimeout(() => { progressContainer.style.display = 'none'; }, 2000);

      } catch (err) {
        console.error(err);
        progressContainer.style.display = 'none';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<p style="color:#ef4444;">❌ Error generating certificate. Try again.</p>';
      }
    });
  </script>
</body>
</html>
